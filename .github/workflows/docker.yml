name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: self-hosted

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/python-cicd-demo .

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/python-cicd-demo

    - name: Deploy Container
      run: |
        docker stop python-app || true
        docker rm python-app || true
        docker run -d -p 5000:5000 --name python-app ${{ secrets.DOCKER_USERNAME }}/python-cicd-demo
